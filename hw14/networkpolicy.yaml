apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: generator-to-redis
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: yet-another-generator
    ports:
    - protocol: TCP
      port: 6379