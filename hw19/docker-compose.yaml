services:
  minio:
    image: minio/minio:RELEASE.2022-04-12T06-55-35Z
    env_file: .env
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ':9001' --address ':9000'
    networks:
      - lakefshw
    volumes:
      - ./data/minio:/data

  lakefs:
    image: treeverse/lakefs:1.30.0
    env_file: .env
    ports:
      - 8000:8000
    networks:
      - lakefshw

  db:
    image: postgres:18
    env_file: .env
    ports:
      - 5432:5432
    networks:
      - lakefshw

networks:
  lakefshw:
    name: lakefshw
