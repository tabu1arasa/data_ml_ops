{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.deployment.name" . }}
  labels:
    app: {{ .Values.backend.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
      - name: {{ .Values.backend.name }}
        {{- /* === Backend image version === */}}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.containerPort }}
        env:
        - name: REDIS_HOST
          value: {{ include "redis.service.name" . | quote }}
        - name: REDIS_PORT
          value: "6379"
        {{- /* === Limits and requests === */}}
        {{- if .Values.backend.resources.enabled }}
        resources:
          {{- if .Values.backend.resources.requests }}
          requests:
            {{- if .Values.backend.resources.requests.memory }}
            memory: {{ .Values.backend.resources.requests.memory | quote }}
            {{- end }}
            {{- if .Values.backend.resources.requests.cpu }}
            cpu: {{ .Values.backend.resources.requests.cpu | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.backend.resources.limits }}
          limits:
            {{- if .Values.backend.resources.limits.memory }}
            memory: {{ .Values.backend.resources.limits.memory | quote }}
            {{- end }}
            {{- if .Values.backend.resources.limits.cpu }}
            cpu: {{ .Values.backend.resources.limits.cpu | quote }}
            {{- end }}
          {{- end }}
        {{- end }}
        {{- if .Values.backend.shm.enabled }}
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        {{- end }}
      {{- if .Values.backend.shm.enabled }}
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.backend.shm.sizeLimit }}
      {{- end }}
{{- end }}