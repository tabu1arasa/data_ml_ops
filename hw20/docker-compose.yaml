services:
  mlflow:
    build: .
    env_file: .env
    ports:
    - 8080:8080
    networks:
    - mlflow
    command: sh -c "mlflow db upgrade ${MLFLOW_SERVER_FILE_STORE}; mlflow server --workers=1 --host 0.0.0.0 --port 8080 --backend-store-uri=${MLFLOW_SERVER_FILE_STORE} --serve-artifacts"

  db:
    image: postgres:18
    env_file: .env
    ports:
    - 5432:5432
    networks:
    - mlflow

networks:
  mlflow:
    name: mlflow
